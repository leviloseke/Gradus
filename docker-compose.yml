services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gradus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradus}
      POSTGRES_DB: ${POSTGRES_DB:-gradus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Single container: Express serves both the API and the built frontend.
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gradus}:${POSTGRES_PASSWORD:-gradus}@postgres:5432/${POSTGRES_DB:-gradus}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NODE_ENV: production
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:5000"
      # 5001 on the host for the Vite dev proxy: macOS AirPlay Receiver occupies 5000
      - "5001:5000"

volumes:
  postgres_data:
