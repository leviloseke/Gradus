# Run Gradus from prebuilt images — no source checkout needed.
#
#   curl -O https://raw.githubusercontent.com/leviloseke/Gradus/main/docker-compose.prebuilt.yml
#   curl -o .env https://raw.githubusercontent.com/leviloseke/Gradus/main/.env.example
#   # edit .env: set POSTGRES_PASSWORD and JWT_SECRET (openssl rand -hex 32)
#   docker compose -f docker-compose.prebuilt.yml up -d
#
# App is served at http://localhost:3000 — the frontend's nginx proxies /api
# to the backend, so only one port needs exposing (or reverse-proxying).

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gradus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-gradus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The frontend's nginx resolves the API upstream by this service name —
  # keep it named "backend".
  backend:
    image: ghcr.io/leviloseke/gradus-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gradus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gradus}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NODE_ENV: production
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/leviloseke/gradus-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
